<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Use the whole screen, even behind notches / rounded corners -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Husker Football — Auto Schedule</title>

  <!-- Cache-bust CSS so the player can’t serve an old copy -->
  <link rel="stylesheet" href="assets/styles.css?v=2026-06-26-2" />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
</head>
<body>
  <div id="view-next" class="view hidden">
    <div class="bg" id="next-bg"></div>

    <div class="next-stack">
      <div class="next-card">
        <div class="row logos">
          <img id="ne-logo" class="logo" alt="Nebraska" />
          <div class="vs" id="divider">vs.</div>
          <img id="opp-logo" class="logo" alt="Opponent" />
        </div>
        <div id="next-opponent" class="opponent"></div>
        <div id="next-datetime" class="detail"></div>
        <div id="next-venue" class="detail"></div>
        <div id="next-tv" class="detail"></div>
      </div>

      <div id="countdown-card" class="countdown-card hidden">
        <div id="countdown-heading" class="countdown-heading">COUNTDOWN TO KICKOFF</div>
        <div id="countdown-grid" class="countdown-grid">
          <div class="countdown-unit">
            <div class="countdown-label">DAYS</div>
            <div id="countdown-days" class="countdown-value">00</div>
          </div>
          <div class="countdown-unit">
            <div class="countdown-label">HOURS</div>
            <div id="countdown-hours" class="countdown-value">00</div>
          </div>
          <div class="countdown-unit">
            <div class="countdown-label">MINUTES</div>
            <div id="countdown-minutes" class="countdown-value">00</div>
          </div>
          <div class="countdown-unit">
            <div class="countdown-label">SECONDS</div>
            <div id="countdown-seconds" class="countdown-value">00</div>
          </div>
        </div>
        <div id="countdown-status" class="countdown-status hidden"></div>
      </div>
    </div>
  </div>

  <div id="view-all" class="view hidden">
    <div class="all-wrap"><!-- JS injects .rows and .game-row here --></div>
  </div>

  <div id="debug" class="debug hidden"></div>

  <script>
    window.UI = {
      theme: "classic-husker",
      rotateSeconds: 15,
      showDividerLiteral: true,
      showCityOnly: true,
      kenBurns: false
    };
    const params = new URLSearchParams(location.search);
    const rot = parseInt(params.get("rot"),10);
    if (!isNaN(rot) && rot > 0) window.UI.rotateSeconds = rot;
    const lockView = params.get("view"); // "next" or "all"
    const debug = params.get("debug") === "1";

    // Cache-bust data fetches
    window.DATA_URL = "data/huskers_schedule_normalized.json?v=" + Date.now();
    window.MANIFEST_URL = "data/stadium_manifest.json?v=" + Date.now();
  </script>

  <!-- Cache-bust JS so new scaling logic definitely loads -->
  <script src="assets/app.js?v=2026-06-26-2"></script>
</body>
</html>
